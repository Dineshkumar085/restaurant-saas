<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro-Dash | Restaurant Analytics</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --glass: rgba(30, 41, 59, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- LOGIN SCREEN --- */
    #loginScreen {
      background: var(--glass);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    .login-header { text-align: center; margin-bottom: 30px; }
    .login-header h2 { font-size: 1.8rem; font-weight: 700; color: #fff; }
    .login-header p { color: var(--text-muted); font-size: 0.9rem; }

    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 15px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid #334155;
      border-radius: 12px;
      color: white;
      outline: none;
      transition: 0.3s;
    }

    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

    /* --- DASHBOARD LAYOUT --- */
    #mainDashboard {
      display: none;
      width: 100%;
      height: 100vh;
      grid-template-columns: 260px 1fr;
    }

    /* Sidebar */
    aside {
      background: var(--card-bg);
      border-right: 1px solid #334155;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
    }

    .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
    .nav-item { padding: 12px 15px; border-radius: 10px; color: var(--text-muted); text-decoration: none; margin-bottom: 8px; transition: 0.2s; cursor: pointer; }
    .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); font-weight: 600; }

    /* Main Content */
    main { padding: 40px; overflow-y: auto; width: 100%; }

    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    
    .live-indicator {
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .pulse { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse-animation 2s infinite; }

    @keyframes pulse-animation { 0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.7); } 100% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } }

    /* Stats Grid */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }

    .stat-card span { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
    .stat-card h3 { font-size: 2rem; margin-top: 8px; font-weight: 700; }

    /* Orders Grid */
    #orders {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .order-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid #334155;
      transition: 0.3s;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .order-card:hover { border-color: var(--primary); transform: translateY(-5px); }

    .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
    .order-id { font-weight: 700; font-size: 1.1rem; }
    .status-badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; font-weight: 700; text-transform: uppercase; }
    .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .status-done { background: rgba(16, 185, 129, 0.1); color: var(--success); }

    .cust-info { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; line-height: 1.6; }
    .cust-info strong { color: var(--text-main); }

    .items-list {
      background: rgba(15, 23, 42, 0.4);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      flex-grow: 1;
    }

    .items-list ul { list-style: none; }
    .items-list li { font-size: 0.85rem; display: flex; justify-content: space-between; margin-bottom: 5px; }

    .total-row { border-top: 1px solid #334155; padding-top: 15px; display: flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem; margin-bottom: 20px;}

    .btn-complete {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: white;
      transition: 0.3s;
    }

    .btn-complete:disabled { background: #334155; color: var(--text-muted); cursor: not-allowed; }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      #mainDashboard {
        grid-template-columns: 1fr; /* Sidebar ko hide karke stack kar dega */
      }

      aside {
        display: none; /* Mobile par sidebar hide kar rahe hain dashboard saaf dikhne ke liye */
      }

      main {
        padding: 15px; /* Mobile par padding kam */
      }

      .stats-container {
        grid-template-columns: 1fr; /* Stats cards ek ke niche ek aayenge */
        gap: 12px;
      }

      .stat-card {
        padding: 15px;
      }

      .stat-card h3 {
        font-size: 1.5rem;
      }

      #orders {
        grid-template-columns: 1fr; /* Order cards mobile par full width honge */
      }

      .header-row h1 {
        font-size: 1.4rem;
      }

      #loginScreen {
        margin: 20px;
        padding: 25px;
      }
    }
  </style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="loginScreen">
  <div class="login-header">
    <h2>Welcome Back</h2>
    <p>Sign in to manage your kitchen</p>
  </div>
  <input id="user" type="text" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button class="btn-primary" onclick="login()">Access Dashboard</button>
</div>

<!-- MAIN DASHBOARD VIEW -->
<div id="mainDashboard">
  <aside>
    <div class="logo"><span>⚡</span> Pro-Dash</div>
    <div class="nav-item active">Orders</div>
    <div class="nav-item">Analytics</div>
    <div class="nav-item">Settings</div>
    <div style="margin-top: auto;" class="nav-item" onclick="location.reload()">Logout</div>
  </aside>

  <main>
    <div class="header-row">
      <h1>Live Orders</h1>
      <div class="live-indicator">
        <div class="pulse"></div> LIVE FEED
      </div>
    </div>

    <div class="stats-container">
      <div class="stat-card">
        <span>Daily Revenue</span>
        <h3 id="daily-sale">₹0</h3>
      </div>
      <div class="stat-card">
        <span>Monthly Revenue</span>
        <h3 id="monthly-sale">₹0</h3>
      </div>
      <div class="stat-card">
        <span>Active Now</span>
        <h3 id="active-orders" style="color: var(--warning);">0</h3>
      </div>
    </div>

    <div id="orders">
      <!-- Orders injected here -->
    </div>
  </main>
</div>

<script>
  const API = "https://restaurant-saas-iehi.onrender.com";
  let restaurantId = null;

  async function login() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    try {
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.restaurant_id) {
        restaurantId = data.restaurant_id;
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainDashboard").style.display = "grid";
        document.body.style.alignItems = "stretch"; 
        loadOrders();
        setInterval(loadOrders, 5000); // Polling every 5 seconds
      } else {
        alert("Invalid credentials. Please try again.");
      }
    } catch (e) {
      alert("Server connection failed.");
    }
  }

  async function loadOrders() {
    if (!restaurantId) return;
    
    try {
      const res = await fetch(`${API}/orders/${restaurantId}`);
      const data = await res.json();

      let html = "";
      let activeCount = 0;
      let todaySale = 0;
      let monthlySale = 0;

      const today = new Date().toISOString().slice(0, 10);
      const currentMonth = new Date().getMonth();

      data.forEach(order => {
        // Analytics calculations
        if (order.status !== "done") activeCount++;
        
        const orderDateStr = order.created_at || "";
        const orderDate = new Date(orderDateStr);

        if (orderDateStr.slice(0,10) === today) {
          todaySale += order.total;
        }
        if (orderDate.getMonth() === currentMonth) {
          monthlySale += order.total;
        }

        // Items logic
        let itemsHtml = "";
        const itemsList = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
        itemsList.forEach(item => {
          itemsHtml += `<li><span>${item.name}</span> <span>₹${item.price}</span></li>`;
        });

        const isDone = order.status === 'done';

        html += `
          <div class="order-card">
            <div class="order-header">
              <span class="order-id">#ORD-${order.id}</span>
              <span class="status-badge ${isDone ? 'status-done' : 'status-pending'}">
                ${order.status}
              </span>
            </div>

            <div class="cust-info">
              👤 <strong>${order.customer_name || "Guest"}</strong><br>
              📍 ${order.customer_address || "Dine-in"} | Table: ${order.table_no || "N/A"}
            </div>

            <div class="items-list">
              <ul>${itemsHtml}</ul>
            </div>

            <div class="total-row">
              <span>Total</span>
              <span>₹${order.total}</span>
            </div>

            <button class="btn-confirm"
        ${order.status !== 'pending' ? 'disabled' : ''}
        onclick="confirmOrder(${order.id})"
        style="
          padding: 12px;
          border-radius: 10px;
          border: none;
          font-weight: 600;
          cursor: pointer;
          background: ${order.status !== 'pending' ? '#334155' : '#10b981'};
          color: ${order.status !== 'pending' ? 'var(--text-muted)' : 'white'};
          margin-bottom: 10px;
          width: 100%;
          transition: 0.3s;
        ">
  ${order.status === 'pending' ? '✅ Confirm Order' : 'Confirmed'}
</button>

<button class="btn-complete" 
        ${isDone ? 'disabled' : ''} 
        onclick="markDone(${order.id})">
  ${isDone ? 'Completed' : 'Mark as Ready'}
</button>
          </div>
        `;
      });

      document.getElementById("orders").innerHTML = html;
      document.getElementById("active-orders").innerText = activeCount;
      document.getElementById("daily-sale").innerText = "₹" + todaySale.toLocaleString('en-IN');
      document.getElementById("monthly-sale").innerText = "₹" + monthlySale.toLocaleString('en-IN');

    } catch (err) {
      console.error("Fetch error:", err);
    }
  }

  async function markDone(id) {
    await fetch(`${API}/order/${id}`, { method: "PUT" });
    loadOrders();
  }
  async function confirmOrder(id) {
  await fetch(`${API}/order/${id}/confirm`, { method: "PUT" });
  loadOrders();
}
</script>

</body>
</html>
