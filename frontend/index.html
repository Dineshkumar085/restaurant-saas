<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4757">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Menu | Order Now</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style> 
  
  header {
  max-width: 500px;          /* हेडर को भी सीमित करें */
  margin: 0 auto;            /* सेंटर में लाने के लिए */
  background: var(--dark);
  color: white;
  padding: 40px 20px;
  text-align: center;
  border-radius: 0 0 30px 30px;
}

.order-details-card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 25px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* कार्ड जैसा लुक */
}

  .order-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 15px;
  font-weight: bold;
  cursor: pointer;
}

    :root { --primary: #ff4757; --dark: #2f3542; --bg: #f1f2f6; --gray: #dfe4ea; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 120px; color: var(--dark); }
    
    header { background: var(--dark); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; }
    #restaurant-name { margin: 0; font-size: 1.8rem; }

    .container {
  max-width: 100%;
  margin: -30px auto 20px; /* 'auto' इसे डेस्कटॉप पर बीच में रखता है */
  padding: 0 10px;
  box-sizing: border-box;
}

    
    .order-details-card { 
      background: white; padding: 20px; border-radius: 20px; margin-bottom: 25px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .input-row { 
  display: flex; 
  gap: 10px; 
}

.input-row input { 
  flex: 1;      /* दोनों इनपुट बराबर जगह लेंगे */
  width: 100%; 
}

input { 
  border: 1px solid var(--gray); 
  padding: 12px; 
  border-radius: 12px; 
  outline: none;
}


    #menu { display: grid; gap: 15px; }

    .menu-item {
      background: white; padding: 15px 20px; border-radius: 20px;
      display: flex; justify-content: space-between; align-items: center;
    }

    .controls { display: flex; align-items: center; gap: 10px; }
.footer-bar {
  position: fixed;
  bottom: 0;
  left: 50%;                 /* स्क्रीन के बीच से शुरू करें */
  transform: translateX(-50%); /* बिल्कुल सेंटर में फिक्स करने के लिए */
  width: 100%;
  max-width: 500px;          /* यह आपके .container की चौड़ाई के बराबर होना चाहिए */
  background: white;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-sizing: border-box;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.08);
  border-radius: 20px 20px 0 0; /* प्रीमियम लुक के लिए ऊपरी कोने गोल */
}


  </style>
</head>

<body>

<header>
  <h1 id="restaurant-name">Loading...</h1>
</header>

<div class="container">

  <div class="order-details-card">
    <div class="input-row">
      <input type="text" id="name" placeholder="Your Name *">
      <input type="number" id="tableNo" placeholder="Table #">
    </div>
    <input type="text" id="address" placeholder="Delivery Address and Mobile No.">
  </div>

  <div id="menu"></div>
</div>

<div class="footer-bar">
  <div>
    ₹<span id="total">0</span>
  </div>
  <button class="order-btn" onclick="orderNow()">Place Order</button>
</div>

<script>
let restaurantData = {}; // ✅ added

const API = "https://restaurant-saas-iehi.onrender.com";

const params = new URLSearchParams(window.location.search);
const restaurantId = params.get("rid") || 1;

let cart = [];
let total = 0;

async function loadData() {
  try {
    // ✅ Restaurant fetch
    const res1 = await fetch(`${API}/restaurant/${restaurantId}`);
    const restaurant = await res1.json();

    restaurantData = restaurant; // ✅ IMPORTANT FIX

    document.getElementById("restaurant-name").innerText =
      restaurant?.name || "Restaurant";

    // ✅ Menu load
    const res = await fetch(`${API}/menu/${restaurantId}`);
    const menuList = await res.json();

    const grouped = {};

    menuList.forEach(item => {
      if (!grouped[item.category]) {
        grouped[item.category] = [];
      }
      grouped[item.category].push(item);
    });

    const menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "";

    Object.keys(grouped).forEach(cat => {

      const title = document.createElement("h3");
      title.innerText = cat;
      title.style.marginTop = "20px";
      menuDiv.appendChild(title);

      grouped[cat].forEach(item => {
        const div = document.createElement("div");
        div.className = "menu-item";

        div.innerHTML = `
          <div style="display:flex; gap:10px; align-items:center;">
            <img src="${item.image}" width="60" height="60" style="border-radius:10px; object-fit:cover;">
            <div>
              <b>${item.name}</b><br>
              ₹${item.price}
            </div>
          </div>

          <div class="controls">
            <button onclick="removeFromCart('${item.name}', ${item.price})">-</button>
            <span id="qty-${item.name.replace(/\s+/g, '')}">0</span>
            <button onclick="addToCart('${item.name}', ${item.price})">+</button>
          </div>
        `;

        menuDiv.appendChild(div);
      });

    });

  } catch (err) {
    console.error(err);
    alert("Backend connection failed");
  }
}

function addToCart(name, price) {
  cart.push({ name, price });
  updateUI(name);
}

function removeFromCart(name) {
  const index = cart.findIndex(i => i.name === name);
  if (index > -1) {
    cart.splice(index, 1);
    updateUI(name);
  }
}

function updateUI(name) {
  total = cart.reduce((sum, item) => sum + item.price, 0);
  document.getElementById("total").innerText = total;

  const qty = cart.filter(i => i.name === name).length;
  const el = document.getElementById(`qty-${name.replace(/\s+/g, '')}`);
  if (el) el.innerText = qty;
}

async function orderNow() {
  const btn = document.querySelector(".order-btn");
btn.disabled = true;
btn.innerText = "Placing...";
  const name = document.getElementById("name").value;
  const address = document.getElementById("address").value;
  const tableNo = document.getElementById("tableNo").value;

  if (!name) {
    alert("Enter name");
    return;
  }

  if (cart.length === 0) {
    alert("Add items first");
    return;
  }

  // ✅ FIXED WhatsApp (dynamic + full details)
  const phone = restaurantData.whatsapp;

  let itemsText = cart.map(i => `• ${i.name} - ₹${i.price}`).join("\n");

  let msg =
`🧾 New Order\n\n` +
`👤 Name: ${name}\n` +
`📍 Address: ${address || "Dine-in"}\n` +
`🍽️ Table: ${tableNo || "N/A"}\n\n` +
`🛒 Items:\n${itemsText}\n\n` +
`💰 Total: ₹${total}`;

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

  // DB SAVE


  const res = await fetch(`${API}/order`, {
  method: "POST",
  headers: {"Content-Type": "application/json"},
  body: JSON.stringify({
    name,
    address,
    table: tableNo,
    items: cart,
    total,
    restaurant_id: restaurantId
  })
});

const data = await res.json();

// ✅ Save order id
localStorage.setItem("order_id", data.order_id);

alert("Order placed ✅");

// start tracking
trackOrder(data.order_id);
}


loadData();
function trackOrder(orderId) {
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`${API}/order-status/${orderId}`);
      const data = await res.json();

      // ✅ CONFIRMED BLOCK
      if (data.status === "confirmed") {
        if (!document.getElementById("confirm-banner")) {
          const banner = document.createElement('div');
          banner.id = "confirm-banner";
          banner.style.cssText = `
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: #2f3542; color: white;
            padding: 20px 25px; border-radius: 20px;
            border: 2px solid #10b981;
            text-align: center; z-index: 10000;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 10px 30px rgba(16,185,129,0.3);
          `;
          banner.innerHTML = `
            <div style="font-size: 32px;">🎉</div>
            <div style="font-weight: 800; font-size: 18px; color: #10b981; margin: 8px 0;">
              Your Order is Confirmed!
            </div>
            <div style="font-size: 13px; opacity: 0.8;">
              We're preparing your food. Please wait...
            </div>
            <button onclick="this.parentElement.remove()" style="
              margin-top: 15px; background: #10b981; color: white;
              border: none; padding: 10px 25px; border-radius: 50px;
              font-weight: bold; cursor: pointer;
            ">Got it 👍</button>
          `;
          document.body.appendChild(banner);
        }
      }

      // ✅ DONE BLOCK
      if (data.status === "done") {
        clearInterval(interval);
        localStorage.removeItem("order_id");

        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js";
        document.head.appendChild(script);

        const style = document.createElement('style');
        style.innerHTML = `
          @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); }
            50% { box-shadow: 0 0 40px rgba(255, 71, 87, 0.8); }
          }
          @keyframes slideIn {
            0% { transform: translate(-50%, -200%) scale(0.5); opacity: 0; }
            70% { transform: translate(-50%, 30px) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, 20px) scale(1); opacity: 1; }
          }
          .ultra-premium-card {
            background: rgba(47, 53, 66, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid #ff4757;
            animation: slideIn 0.8s forwards, glow 2s infinite;
          }
          .fire-emoji { font-size: 40px; animation: bounce 1s infinite; }
          @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        `;
        document.head.appendChild(style);

        const banner = document.createElement('div');
        banner.className = "ultra-premium-card";
        banner.style.cssText = `
          position: fixed; top: 20px; left: 50%; width: 90%; max-width: 400px;
          color: white; padding: 25px; border-radius: 30px; z-index: 10000;
          display: flex; flex-direction: column; align-items: center; text-align: center;
          font-family: 'Poppins', sans-serif; gap: 15px;
        `;
        banner.innerHTML = `
          <div class="fire-emoji">🎉</div>
          <div>
            <div style="font-weight: 900; font-size: 22px; color: #ff4757; text-transform: uppercase;">Order is Ready!</div>
            <div style="font-size: 14px; opacity: 0.9; margin-top: 5px;">Your delicious food is waiting.</div>
          </div>
          <button id="celebrate-btn" style="
            background: #ff4757; color: white; border: none; padding: 12px 30px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3); font-size: 16px;
          ">I'm Coming! 🏃‍♂️</button>
        `;
        document.body.appendChild(banner);

        let originalTitle = document.title;
        setInterval(() => {
          document.title = document.title === "😋 Order Ready!" ? originalTitle : "😋 Order Ready!";
        }, 1000);

        script.onload = () => {
          confetti({ particleCount: 100, spread: 160, origin: { y: 0.3 } });
          document.getElementById('celebrate-btn').onclick = () => {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff4757', '#ffffff', '#ff9f43'] });
            setTimeout(() => { banner.style.opacity = '0'; setTimeout(() => banner.remove(), 500); }, 2000);
          };
        };
      }

    } catch (err) {
      console.log(err);
    }
  }, 3000);
}
window.onload = () => {
  const savedOrder = localStorage.getItem("order_id");
  if (savedOrder) {
    trackOrder(savedOrder);
  }
};
</script>

</body>
</html>
